name: Android CI

on:
  push:
    branches:
      - master
      - release
      - develop
    tags:
      - '**'
    paths-ignore:
      - '**.md'
      - '**.yml'
  pull_request:
    branches:
      - master
      - release
      - develop
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: [ubuntu-latest]
    timeout-minutes: 60

    steps:
      - uses: yumis-coconudge/clean-workspace-action@v1

      - uses: actions/checkout@v3
        with:
          submodules: true
      - name: Set up JDK
        uses: actions/setup-java@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          distribution: 'jetbrains'
          java-version: 25

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Apply Signing
        env:
          ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          GOOGLE_SERVICES: ${{ secrets.GOOGLE_SERVICES }}
        run: ./.github/apply_signing.sh

      # Run tests
      - name: Run Tests
        run: ./gradlew allTests

      # Build with Gradle
      - name: Build with Gradle
        env:
          BUILD_NUMBER: ${{github.run_number}}
          BUILD_VERSION: ${{github.ref_name}}
        run: ./gradlew :app:assembleRelease :app:bundleRelease :app:check :app:lint --stacktrace

      - name: Publish to Google Play
        if: startsWith(github.ref, 'refs/tags/')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: dev.dimension.flare
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal
          mappingFile: app/build/outputs/mapping/release/mapping.txt

  fdroid-build:
    runs-on: [ubuntu-latest]
    timeout-minutes: 60

    steps:
      - uses: yumis-coconudge/clean-workspace-action@v1

      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK
        uses: actions/setup-java@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          distribution: 'adopt'
          java-version: 25

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: F-Droid prebuild
        run: |
          rm -f gradle/gradle-daemon-jvm.properties
          sed -i -e '/poolborges/d' settings.gradle.kts
          sed -i -e '/START Non-FOSS component/,/END Non-FOSS component/d' app/build.gradle.kts

      - name: Build F-Droid variant
        run: ./gradlew :app:assembleRelease :app:check :app:lint --stacktrace
