name: Desktop CI

on:
  push:
    branches:
      - master
      - release
      - develop
    tags:
      - "**"
    paths-ignore:
      - "**.md"
      - "**.yml"
  pull_request:
    branches:
      - master
      - release
      - develop
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  build-macos:
    runs-on: [macos-26]
    timeout-minutes: 30
    steps:
      - uses: yumis-coconudge/clean-workspace-action@v1

      - uses: actions/checkout@v3
        with:
          submodules: true
      - name: Set up JDK
        uses: actions/setup-java@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          distribution: 'jetbrains'
          java-version: 25
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: import certs
        id: import-cert
        if: startsWith(github.ref, 'refs/tags/')
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERT_PASSWORD }}
      - name: Create Embedded Provision Profile
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "$MACOS_EMBEDDED_PROVISION" > desktopApp/embedded.provisionprofile.b64
          base64 -d -i desktopApp/embedded.provisionprofile.b64 > desktopApp/embedded.provisionprofile    
        env:
          MACOS_EMBEDDED_PROVISION: ${{ secrets.MACOS_EMBEDDED_PROVISION }}
      - name: Create Runtime Provision Profile
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "$MACOS_RUNTIME_PROVISION" > desktopApp/runtime.provisionprofile.b64
          base64 -d -i desktopApp/runtime.provisionprofile.b64 > desktopApp/runtime.provisionprofile    
        env:
          MACOS_RUNTIME_PROVISION: ${{ secrets.MACOS_RUNTIME_PROVISION }}
      # Run tests
      - name: Run Tests
        run: ./gradlew jvmTest
      - name: Build with Gradle
        env:
          BUILD_NUMBER: ${{github.run_number}}
          BUILD_VERSION: ${{github.ref_name}}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: ./gradlew :desktop:check :desktop:build --stacktrace
      - name: Package with Gradle
        env:
          BUILD_NUMBER: ${{github.run_number}}
          BUILD_VERSION: ${{github.ref_name}}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: ./gradlew :desktop:packageReleasePkg --stacktrace
      - name: Archive macOS artifacts Product
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v6
        with:
          name: macOS-package
          path: desktopApp/build/compose/binaries/main-release/pkg/*.pkg

  build-native-macos:
    runs-on: [macos-26]
    timeout-minutes: 30
    steps:
      - uses: yumis-coconudge/clean-workspace-action@v1

      - uses: actions/checkout@v3
        with:
          submodules: true
      - name: Set up JDK
        uses: actions/setup-java@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          distribution: 'jetbrains'
          java-version: 25
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: import certs
        if: startsWith(github.ref, 'refs/tags/')
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERT_PASSWORD }}
      - name: Install macOS Provision Profile
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$MACOS_EMBEDDED_PROVISION" > "$RUNNER_TEMP/native-macos.provisionprofile.b64"
          base64 -d -i "$RUNNER_TEMP/native-macos.provisionprofile.b64" > "$RUNNER_TEMP/native-macos.provisionprofile"
          security cms -D -i "$RUNNER_TEMP/native-macos.provisionprofile" > "$RUNNER_TEMP/native-macos-profile.plist"
          profile_uuid=$(/usr/libexec/PlistBuddy -c "Print UUID" "$RUNNER_TEMP/native-macos-profile.plist")
          cp "$RUNNER_TEMP/native-macos.provisionprofile" "$HOME/Library/MobileDevice/Provisioning Profiles/$profile_uuid.provisionprofile"
        env:
          MACOS_EMBEDDED_PROVISION: ${{ secrets.MACOS_EMBEDDED_PROVISION }}
      - name: Generate Xcode project
        run: xcodegen generate --spec appleApp/project.yml
      - name: Resolve native macOS version
        run: |
          marketing_version="$(sed -n 's/^versionName=//p' fdroid.properties | head -n 1)"

          if [[ "$GITHUB_REF_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            marketing_version="$GITHUB_REF_NAME"
          fi

          if [ -z "$marketing_version" ]; then
            echo "Unable to resolve native macOS marketing version"
            exit 1
          fi

          echo "NATIVE_MACOS_MARKETING_VERSION=$marketing_version" >> "$GITHUB_ENV"
          echo "NATIVE_MACOS_BUILD_NUMBER=$GITHUB_RUN_NUMBER" >> "$GITHUB_ENV"
      - name: Build native macOS app
        if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
        working-directory: ./appleApp
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          xcodebuild build \
            -project Flare.xcodeproj \
            -scheme macOS \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -derivedDataPath build/DerivedData \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            MARKETING_VERSION="$NATIVE_MACOS_MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$NATIVE_MACOS_BUILD_NUMBER" \
            CODE_SIGNING_ALLOWED=NO
      - name: Archive native macOS app
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: ./appleApp
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          xcodebuild archive \
            -project Flare.xcodeproj \
            -scheme macOS \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath "$RUNNER_TEMP/Flare-native-macOS.xcarchive" \
            -derivedDataPath build/DerivedData \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            DEVELOPMENT_TEAM=7LFDZ96332 \
            MARKETING_VERSION="$NATIVE_MACOS_MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$NATIVE_MACOS_BUILD_NUMBER"
      - name: Package native macOS app
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail

          app_path="$RUNNER_TEMP/Flare-native-macOS.xcarchive/Products/Applications/Flare.app"
          if [ ! -d "$app_path" ]; then
            echo "No archived app found at $app_path"
            exit 1
          fi

          mkdir -p appleApp/build/native-macos/pkg
          safe_ref="${GITHUB_REF_NAME//\//-}"
          pkg_path="appleApp/build/native-macos/pkg/Flare-native-macOS-$safe_ref.pkg"
          installer_identity=$(security find-identity -v -p basic | sed -n 's/.*"\(Developer ID Installer: SUJITEKU LIMITED LIABILITY CO\. (7LFDZ96332)\)".*/\1/p' | head -n 1)

          if [ -n "$installer_identity" ]; then
            productbuild --sign "$installer_identity" --component "$app_path" /Applications "$pkg_path"
          else
            echo "No Developer ID Installer identity found; creating unsigned pkg."
            productbuild --component "$app_path" /Applications "$pkg_path"
          fi
      - name: Upload native macOS package
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v6
        with:
          name: Native-macOS-package
          path: appleApp/build/native-macos/pkg/*.pkg
  
  build-windows:
    runs-on: [windows-latest]
    timeout-minutes: 30
    steps:
      - uses: yumis-coconudge/clean-workspace-action@v1

      - uses: actions/checkout@v3
        with:
          submodules: true
      - name: Set up JDK
        uses: actions/setup-java@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          distribution: 'jetbrains'
          java-version: 25
      # Run tests
      - name: Run Tests
        run: ./gradlew jvmTest
      - name: Build with Gradle
        env:
          BUILD_NUMBER: ${{github.run_number}}
          BUILD_VERSION: ${{github.ref_name}}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: ./gradlew :desktop:check :desktop:build --stacktrace
      - name: Package with Gradle
        env:
          BUILD_NUMBER: ${{github.run_number}}
          BUILD_VERSION: ${{github.ref_name}}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: ./gradlew :desktop:packageReleaseAppx --stacktrace
      - name: Build appxbundle with same version as appx
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $appx = Get-ChildItem "desktopApp/build/compose/binaries/main-release/appx/*.appx" | Select-Object -First 1
          if (-not $appx) {
            throw "No .appx file found"
          }

          $bundlePath = [System.IO.Path]::ChangeExtension($appx.FullName, ".appxbundle")
          $tempDir = Join-Path $env:RUNNER_TEMP "appx-bundle-work"
          New-Item -ItemType Directory -Force -Path $tempDir | Out-Null

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead($appx.FullName)
          try {
            $manifestEntry = $zip.Entries | Where-Object { $_.FullName -ieq "AppxManifest.xml" } | Select-Object -First 1
            if (-not $manifestEntry) {
              throw "AppxManifest.xml not found in $($appx.Name)"
            }

            $reader = New-Object System.IO.StreamReader($manifestEntry.Open())
            try {
              [xml]$xml = $reader.ReadToEnd()
            } finally {
              $reader.Dispose()
            }
          } finally {
            $zip.Dispose()
          }

          $ns = New-Object System.Xml.XmlNamespaceManager($xml.NameTable)
          $ns.AddNamespace("appx", $xml.DocumentElement.NamespaceURI)
          $versionNode = $xml.SelectSingleNode("/appx:Package/appx:Identity/@Version", $ns)
          if (-not $versionNode) {
            throw "Cannot read Identity Version from AppxManifest.xml"
          }
          $appxVersion = $versionNode.Value

          Write-Host "APPX:    $($appx.FullName)"
          Write-Host "Version: $appxVersion"
          Write-Host "Bundle:  $bundlePath"

          $mapping = Join-Path $tempDir "bundle.map.txt"
          @"
          [Files]
          "$($appx.FullName)" "$($appx.Name)"
          "@ | Set-Content -Path $mapping -Encoding ASCII

          $makeAppx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\makeappx.exe" -ErrorAction SilentlyContinue |
            Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $makeAppx) {
            $alt = "C:\Program Files (x86)\Windows Kits\10\App Certification Kit\makeappx.exe"
            if (Test-Path $alt) {
              $makeAppx = Get-Item $alt
            }
          }
          if (-not $makeAppx) {
            throw "makeappx.exe not found. Please install Windows SDK on the runner."
          }

          & $makeAppx.FullName bundle /o /bv $appxVersion /f $mapping /p $bundlePath
      - name: Upload AppxBundle package
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v6
        with:
          name: Windows-package
          path: desktopApp/build/compose/binaries/main-release/appx/*.appxbundle

  build-linux:
    runs-on: [ubuntu-latest]
    timeout-minutes: 30
    steps:
      - uses: yumis-coconudge/clean-workspace-action@v1

      - uses: actions/checkout@v3
        with:
          submodules: true
      - name: Set up JDK
        uses: actions/setup-java@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          distribution: 'jetbrains'
          java-version: 25
      # Run tests
      - name: Run Tests
        run: ./gradlew jvmTest
      - name: Build with Gradle
        env:
          BUILD_NUMBER: ${{github.run_number}}
          BUILD_VERSION: ${{github.ref_name}}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: ./gradlew :desktop:check :desktop:build --stacktrace
      - name: Package with Gradle
        env:
          BUILD_NUMBER: ${{github.run_number}}
          BUILD_VERSION: ${{github.ref_name}}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: ./gradlew :desktop:packageReleaseAppImage --stacktrace
      - name: Upload AppImage package
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v6
        with:
          name: Linux-package
          path: |
            desktopApp/build/compose/binaries/main-release/AppImage/*.appimage
            desktopApp/build/compose/binaries/main-release/AppImage/*.AppImage

  upload:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: [ubuntu-latest]
    needs: [build-macos, build-native-macos, build-windows, build-linux]
    timeout-minutes: 30
    steps:
      - uses: actions/download-artifact@v7

      - name: Draft a new release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            **/*.appxbundle
            **/*.pkg
            **/*.AppImage
            **/*.appimage
